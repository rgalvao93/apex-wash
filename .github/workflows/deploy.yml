name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Carimbar CSS/JS com o hash do commit (cache-busting)
        run: |
          sha="${GITHUB_SHA::8}"
          sed -i "s|href=\"css/style.css\"|href=\"css/style.css?v=${sha}\"|g" index.html
          sed -i "s|src=\"js/main.js\"|src=\"js/main.js?v=${sha}\"|g" index.html
          echo "Assets carimbados com ?v=${sha}"
          grep -n "style.css?v=\|main.js?v=" index.html || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
